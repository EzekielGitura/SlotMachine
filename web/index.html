<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slot Room</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Slot Room</h1>
          <p id="player-summary">No active room</p>
        </div>
        <div class="room-badge">
          <span>Room</span>
          <strong id="room-code">------</strong>
        </div>
      </header>

      <main class="layout">
        <section class="play-surface">
          <div class="room-controls">
            <form id="create-form" class="control-group">
              <label>
                Name
                <input id="create-name" type="text" maxlength="24" value="Player">
              </label>
              <label>
                Room Stake
                <input id="create-stake" type="number" min="100" max="5000" step="100" value="500" autocomplete="off">
              </label>
              <button type="submit">Create Room</button>
            </form>

            <form id="join-form" class="control-group">
              <label>
                Name
                <input id="join-name" type="text" maxlength="24" value="Friend">
              </label>
              <label>
                Code
                <input id="join-code" type="text" maxlength="6" autocomplete="off">
              </label>
              <button type="submit">Join Room</button>
            </form>

            <form id="resume-form" class="control-group resume-group">
              <label>
                Save Code
                <input id="resume-code" type="text" maxlength="14" autocomplete="off" placeholder="ABCD-EFGH-IJKL">
              </label>
              <button type="submit">Resume</button>
            </form>
          </div>

          <div class="profile-strip">
            <span>Coins</span>
            <strong id="current-balance-value">50,000 starting coins</strong>
            <span>Save Code</span>
            <strong id="save-code-value">Create or resume a profile</strong>
            <span>Friend Code</span>
            <strong id="friend-code-value">Add a profile first</strong>
          </div>

          <div class="audio-controls" aria-label="Audio controls">
            <button id="music-toggle" type="button">Music Off</button>
            <button id="sound-toggle" type="button">Sound On</button>
          </div>

          <div class="slot-cabinet" id="slot-cabinet">
            <div class="cabinet-beacon" aria-hidden="true"></div>
            <div class="cabinet-arch">
              <span>Lucky Room</span>
            </div>
            <div class="cabinet-window">
              <div id="reels" class="reels" aria-live="polite"></div>
              <button id="lever-button" class="lever" type="button" aria-label="Pull lever to spin">
                <span class="lever-knob"></span>
                <span class="lever-stick"></span>
              </button>
            </div>
            <div class="cabinet-base" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <form id="spin-form" class="spin-controls">
            <label>
              Lines
              <input id="lines" type="number" min="1" max="5" value="5">
            </label>
            <label>
              Bet
              <input id="bet" type="number" min="1" max="100" value="10">
            </label>
            <button id="spin-button" type="submit" disabled>Spin</button>
          </form>

          <div class="room-actions">
            <button id="daily-button" type="button" disabled>Claim Daily</button>
            <button id="pause-button" type="button" disabled>Pause & Save</button>
            <button id="leave-button" type="button" disabled>Leave Room</button>
            <button id="finish-button" type="button" disabled>End Room</button>
          </div>

          <div id="result-strip" class="result-strip">Ready</div>
        </section>

        <aside class="side-panel">
          <section>
            <h2>Leaderboard</h2>
            <div id="leaderboard" class="leaderboard"></div>
          </section>

          <section>
            <h2>Rank Gifts</h2>
            <div id="rank-gifts" class="rank-gifts"></div>
          </section>

          <section>
            <h2>Stats</h2>
            <dl id="stats" class="stats-grid"></dl>
          </section>

          <section>
            <h2>Room Feed</h2>
            <ol id="events" class="events"></ol>
          </section>

          <section class="friends-panel">
            <h2>Friends</h2>
            <div id="friends" class="friends-list"></div>
            <form id="friend-form" class="friend-form">
              <label>
                Friend Code
                <input id="friend-code-input" type="text" maxlength="8" autocomplete="off" placeholder="8-character code">
              </label>
              <button type="submit">Add</button>
            </form>
          </section>

          <section class="chat-panel">
            <h2>Room Chat</h2>
            <div id="chat-log" class="chat-log" aria-live="polite"></div>
            <div class="emoji-row" aria-label="Quick emoji reactions">
              <button type="button" data-emoji="&#128293;">&#128293;</button>
              <button type="button" data-emoji="&#127826;">&#127826;</button>
              <button type="button" data-emoji="&#128142;">&#128142;</button>
              <button type="button" data-emoji="&#127920;">&#127920;</button>
            </div>
            <form id="chat-form" class="chat-form">
              <label>
                Message
                <input id="chat-input" type="text" maxlength="180" autocomplete="off" placeholder="Cheer, tease, or send a quick reaction">
              </label>
              <button type="submit">Send</button>
            </form>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
